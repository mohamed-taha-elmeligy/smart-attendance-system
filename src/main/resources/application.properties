# ============================================================================
# eMTS SMART ATTENDANCE SYSTEM - APPLICATION CONFIGURATION
# Database: PostgreSQL with R2DBC (Reactive)
# Environment: Local Development + Railway Production
# ============================================================================


# ============================================================================
# 1. APPLICATION SETTINGS
# ============================================================================
spring.application.name=emts-smart-attendance-system
server.port=${PORT:8083}
server.address=0.0.0.0

# ============================================================================
# 2. R2DBC DATABASE CONFIGURATION
# ============================================================================
spring.r2dbc.url=${R2DBC_URL}
spring.r2dbc.username=${DB_USERNAME}
spring.r2dbc.password=${DB_PASSWORD}
spring.r2dbc.pool.max-acquire-time=3000
spring.r2dbc.pool.max-idle-time=900000
spring.r2dbc.pool.max-lifetime=3600000
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.min-idle=5
spring.r2dbc.pool.validation-query=SELECT 1


# ============================================================================
# 3. FLYWAY MIGRATION
# ============================================================================
spring.flyway.enabled=true
spring.flyway.url=${FLYWAY_URL}
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/postgre
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.verbose=true


# ============================================================================
# 4. H2 CONSOLE CONFIGURATION (Development/Testing Only)
# ============================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false


# ============================================================================
# 5. JWT CONFIGURATION
# ============================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000


# ============================================================================
# 6. LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.emts.smart_attendance_system=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
logging.level.org.springframework.data.r2dbc=DEBUG
logging.level.io.r2dbc=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.SeederLogger=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# logging.file.name=logs/attendance-system.log
# logging.file.max-size=10MB
# logging.file.max-history=30


# ============================================================================
# Tell Swagger to use HTTPS
