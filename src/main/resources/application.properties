# ============================================================================
# 3. FLYWAY MIGRATION - POSTGRESQL (LOCAL)
# ============================================================================
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/smart-attendance-system
spring.flyway.user=postgres
spring.flyway.password=admin123456789
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/postgre
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.verbose=true
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=false


