# ============================================================================
# 4. H2 CONSOLE CONFIGURATION (Development/Testing Only)
# ============================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false


# ============================================================================
# 5. JWT CONFIGURATION
# ============================================================================
jwt.secret=mySecretKeyForJWTTokenGenerationMustBeAtLeast512BitsLongToWorkWithHS512Algorithm2025eMTSSmartAttendanceSystem
jwt.expiration=86400000
jwt.refresh-expiration=604800000


# ============================================================================
# 6. LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.emts.smart_attendance_system=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
logging.level.org.springframework.data.r2dbc=DEBUG
logging.level.io.r2dbc=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.SeederLogger=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# logging.file.name=logs/attendance-system.log
# logging.file.max-size=10MB
# logging.file.max-history=30


# ============================================================================
# 7. SELF-HEALING CONFIGURATION
# ============================================================================
self.healing.seeder.interval=3600000
self.healing.retry.max-attempts=3
self.healing.retry.initial-delay=2000
self.healing.retry.max-delay=10000
self.healing.retry.jitter=0.5
role.seeder.enabled=true