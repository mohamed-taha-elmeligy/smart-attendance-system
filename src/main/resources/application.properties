# ============================================================================
# eMTS SMART ATTENDANCE SYSTEM - APPLICATION CONFIGURATION
# Database: PostgreSQL with R2DBC (Reactive)
# Environment: Local Development + Railway Production
# ============================================================================


# ============================================================================
# 1. APPLICATION SETTINGS
# ============================================================================
spring.application.name=emts-smart-attendance-system
server.port=${PORT:8083}


# ============================================================================
# 2. R2DBC DATABASE CONFIGURATION - RAILWAY
# ============================================================================

spring.r2dbc.url=r2dbc:postgresql://ballast.proxy.rlwy.net:22939/railway
spring.r2dbc.username=${PGUSER}
spring.r2dbc.password=${PGPASSWORD}
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-idle-time=30m
spring.data.r2dbc.repositories.enabled=true


# ============================================================================
# 3. FLYWAY MIGRATION - RAILWAY
# ============================================================================

spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://ballast.proxy.rlwy.net:22939/railway
spring.flyway.user=postgres
spring.flyway.password=NmyhWjqjMzvfUYjSfVjvWqfEvYAxNlzN
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/postgre
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.verbose=true




# ============================================================================
# 4. H2 CONSOLE CONFIGURATION (Development/Testing Only)
# ============================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false


# ============================================================================
# 5. JWT CONFIGURATION
# ============================================================================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeAtLeast512BitsLongToWorkWithHS512Algorithm2025eMTSSmartAttendanceSystem}
jwt.expiration=86400000
jwt.refresh-expiration=604800000


# ============================================================================
# 6. LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.emts.smart_attendance_system=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
logging.level.org.springframework.data.r2dbc=DEBUG
logging.level.io.r2dbc=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.SeederLogger=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# logging.file.name=logs/attendance-system.log
# logging.file.max-size=10MB
# logging.file.max-history=30


# ============================================================================
# 7. SELF-HEALING CONFIGURATION
# ============================================================================
self.healing.seeder.interval=3600000
self.healing.retry.max-attempts=3
self.healing.retry.initial-delay=2000
self.healing.retry.max-delay=10000
self.healing.retry.jitter=0.5
role.seeder.enabled=true


