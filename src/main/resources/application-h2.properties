
# ============================================================================

# H2
spring.datasource.url=jdbc:h2:mem:attendance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=

# Flyway
spring.flyway.url=jdbc:h2:mem:attendance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.flyway.user=sa
spring.flyway.password=
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/h2

# H2 Console
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.io.r2dbc.h2=DEBUG